<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Multi-LLM AI Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-container {
            height: calc(100vh - 250px);
            min-height: 400px;
        }
        .message-bubble {
            max-width: 85%;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .provider-gemini { border-left: 4px solid #4285f4; }
        pre {
            background: #1e293b;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid rgba(255,255,255,0.05);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 via-emerald-400 to-amber-400 bg-clip-text text-transparent">
                Unified AI Hub
            </h1>
            <p class="text-slate-400 mt-2 text-sm uppercase tracking-widest">Local FastAPI Backend Connected</p>
        </header>

        <!-- Chat Area -->
        <div class="glass-panel rounded-2xl flex flex-col overflow-hidden">
            <div id="chatHistory" class="chat-container overflow-y-auto p-6 space-y-6">
                <!-- Welcome Message -->
                <div class="flex justify-start">
                    <div class="message-bubble bg-slate-800 p-4 rounded-2xl rounded-tl-none border border-slate-700 shadow-lg">
                        <div class="text-[10px] font-bold uppercase mb-1 opacity-50 text-blue-400">System</div>
                        <div class="whitespace-pre-wrap text-sm leading-relaxed text-slate-200">System Ready. Connected directly to your local FastAPI server. Type a message below to begin!</div>
                    </div>
                </div>
            </div>

            <!-- Loading Indicator -->
            <div id="loadingIndicator" class="hidden px-6 py-2">
                <div class="flex items-center space-x-2 text-blue-400">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    <span class="text-xs font-medium uppercase tracking-tighter">AI is thinking...</span>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 bg-slate-900/50 border-t border-slate-700">
                <form id="chatForm" class="flex gap-2">
                    
                    <!-- Clear Chat Button -->
                    <button type="button" onclick="clearChat()" title="Wipe Memory"
                        class="bg-red-600/20 hover:bg-red-500/40 text-red-400 border border-red-500/30 px-5 py-3 rounded-xl transition-all flex items-center justify-center">
                        <i class="fas fa-trash-alt"></i>
                    </button>

                    <textarea id="userInput" rows="1" placeholder="Type your question here..." 
                        class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 outline-none resize-none transition-all"></textarea>
                    
                    <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-semibold transition-all flex items-center justify-center">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const chatHistory = document.getElementById('chatHistory');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // Auto-resize text area
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Add message to screen
        function appendMessage(role, text, provider = '') {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const providerClass = provider ? `provider-${provider}` : '';
            const bgClass = role === 'user' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-200 border border-slate-700';
            const radiusClass = role === 'user' ? 'rounded-tr-none' : 'rounded-tl-none';
            const headerText = role === 'system' ? '<div class="text-[10px] font-bold uppercase mb-1 opacity-50 text-red-400">System</div>' : (provider ? `<div class="text-[10px] font-bold uppercase mb-1 opacity-50">${provider}</div>` : '');

            wrapper.innerHTML = `
                <div class="message-bubble ${bgClass} ${radiusClass} ${providerClass} p-4 rounded-2xl shadow-lg">
                    ${headerText}
                    <div class="whitespace-pre-wrap text-sm leading-relaxed">${formatText(text)}</div>
                </div>
            `;
            
            chatHistory.appendChild(wrapper);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // Format code blocks
        function formatText(text) {
            return text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        }

        // Handle Clear Chat
        async function clearChat() {
            try {
                const response = await fetch("http://127.0.0.1:8000/api/clear", { method: "POST" });
                if (!response.ok) throw new Error("Failed to clear backend");

                chatHistory.innerHTML = '';
                appendMessage('system', 'Memory wiped. Starting a fresh conversation.');
            } catch (error) {
                appendMessage('system', '⚠️ Error: Could not reach the server to clear memory.');
            }
        }

        // Handle Send Message
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            loadingIndicator.classList.remove('hidden');

            try {
                const response = await fetch("http://127.0.0.1:8000/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: text, model: "fast" })
                });

                const data = await response.json();
                loadingIndicator.classList.add('hidden');
                
                if (!response.ok) {
                    appendMessage('system', `⚠️ Server Error: ${data.detail}`);
                } else {
                    appendMessage('ai', data.response, 'gemini');
                }
            } catch (error) {
                loadingIndicator.classList.add('hidden');
                appendMessage('system', '⚠️ Error: Failed to hit local server. Verify Uvicorn is running.');
            }
        });

        // Allow pressing Enter to send
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
